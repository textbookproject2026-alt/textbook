config:
  default: true
  MD013: false        # no hard line-length limit (prose)
  MD033: false        # allow inline HTML (raw tables from Word migration)
  MD041: false        # first line need not be a top-level heading
  MD034: false        # allow bare URLs (reference docs)
  MD040: false        # fenced blocks needn't specify a language (dir trees)
  MD024:
    siblings_only: true
ignores:
  - "node_modules/**"
  - "templates/**"
  - "docs/**"
