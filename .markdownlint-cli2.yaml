# markdownlint-cli2 config for prose-heavy OER content
config:
  default: true
  MD013: false        # no hard line-length limit (prose)
  MD033: false        # allow inline HTML (raw tables from Word migration)
  MD041: false        # first line need not be a top-level heading
  MD024:
    siblings_only: true   # repeated headings allowed across sections
ignores:
  - "node_modules/**"
  - "templates/**"        # tokenised __KEY__ files aren't valid standalone markdown
